version: "3"

vars:
  DOCKER_REPO: ghcr.io
  DOCKER_OWNER: specsnl
  # Latatest version of Hadolint: https://hub.docker.com/r/hadolint/hadolint/tags or https://github.com/hadolint/hadolint/releases
  HADOLINT_TAG_VERSION: v2.14.0
  # Latest version of gomplate: https://hub.docker.com/r/hairyhenderson/gomplate/tags or https://github.com/hairyhenderson/gomplate/releases
  GOMPLATE_TAG_VERSION: v5.1.0

# env:
#   BUILDKIT_PROGRESS: plain

silent: true

tasks:

  build:
    desc: Build all PHP Docker image targets of the FPM, Apache and FrankenPHP variants
    cmds:
      - task: build:fpm
      - task: build:apache
      - task: build:frankenphp

  lint:
    desc: Apply a Dockerfile linter to all Dockerfiles
    cmds:
      - task: lint:fpm
      - task: lint:apache
      - task: lint:frankenphp

  build:fpm:
    desc: Build all PHP Docker image targets of the FPM variant
    deps: [lint:fpm]
    vars:
      DOCKER_IMAGE_NAME: php84
      DOCKER_FILE_PATH: ./fpm/Dockerfile
    cmds:
      - task: build:target
        vars:
          TARGET: runtime
          DOCKER_IMAGE_NAME: '{{.DOCKER_IMAGE_NAME}}'
          DOCKER_FILE_PATH: '{{.DOCKER_FILE_PATH}}'
      - task: build:target
        vars:
          TARGET: builder
          DOCKER_IMAGE_NAME: '{{.DOCKER_IMAGE_NAME}}'
          DOCKER_FILE_PATH: '{{.DOCKER_FILE_PATH}}'
      - task: build:target
        vars:
          TARGET: builder_nodejs
          DOCKER_IMAGE_NAME: '{{.DOCKER_IMAGE_NAME}}'
          DOCKER_FILE_PATH: '{{.DOCKER_FILE_PATH}}'

  build:apache:
    desc: Build all PHP Docker image targets of the Apache variant
    deps: [lint:apache]
    vars:
      DOCKER_IMAGE_NAME: php84/apache
      DOCKER_FILE_PATH: ./apache/Dockerfile
    cmds:
      - task: build:target
        vars:
          TARGET: runtime
          DOCKER_IMAGE_NAME: '{{.DOCKER_IMAGE_NAME}}'
          DOCKER_FILE_PATH: '{{.DOCKER_FILE_PATH}}'
      - task: build:target
        vars:
          TARGET: builder
          DOCKER_IMAGE_NAME: '{{.DOCKER_IMAGE_NAME}}'
          DOCKER_FILE_PATH: '{{.DOCKER_FILE_PATH}}'
      - task: build:target
        vars:
          TARGET: builder_nodejs
          DOCKER_IMAGE_NAME: '{{.DOCKER_IMAGE_NAME}}'
          DOCKER_FILE_PATH: '{{.DOCKER_FILE_PATH}}'

  build:frankenphp:
    desc: Build all PHP Docker image targets of the FrankenPHP variant
    deps: [lint:frankenphp]
    vars:
      DOCKER_IMAGE_NAME: php84/frankenphp
      DOCKER_FILE_PATH: ./frankenphp/Dockerfile
    cmds:
      - task: build:target
        vars:
          TARGET: runtime
          DOCKER_IMAGE_NAME: '{{.DOCKER_IMAGE_NAME}}'
          DOCKER_FILE_PATH: '{{.DOCKER_FILE_PATH}}'
      - task: build:target
        vars:
          TARGET: builder
          DOCKER_IMAGE_NAME: '{{.DOCKER_IMAGE_NAME}}'
          DOCKER_FILE_PATH: '{{.DOCKER_FILE_PATH}}'
      - task: build:target
        vars:
          TARGET: builder_nodejs
          DOCKER_IMAGE_NAME: '{{.DOCKER_IMAGE_NAME}}'
          DOCKER_FILE_PATH: '{{.DOCKER_FILE_PATH}}'

  build:target:
    preconditions:
      - sh: >
          test '{{.TARGET}}' = 'runtime'
          -o '{{.TARGET}}' = 'builder'
          -o '{{.TARGET}}' = 'builder_nodejs'
        msg: TARGET needs to contain the Docker TARGET [runtime, builder, builder_nodejs]
    vars:
      VERSION: '{{.VERSION | default "latest"}}'
    cmds:
      - docker build
        --target {{.TARGET}}
        --tag {{.DOCKER_REPO}}/{{.DOCKER_OWNER}}/{{.DOCKER_IMAGE_NAME}}:{{.TARGET}}-{{.VERSION}}
        --file {{.DOCKER_FILE_PATH}}
        .
    requires:
      vars: [DOCKER_IMAGE_NAME, TARGET, DOCKER_FILE_PATH]

  lint:fpm:
    desc: Apply a Dockerfile linter (https://github.com/hadolint/hadolint)
    cmds:
      - task: do:lint
        vars: { DOCKERFILE_PATH: fpm/Dockerfile }

  lint:apache:
    desc: Apply a Dockerfile linter (https://github.com/hadolint/hadolint)
    cmds:
      - task: do:lint
        vars: { DOCKERFILE_PATH: apache/Dockerfile }

  lint:frankenphp:
    desc: Apply a Dockerfile linter (https://github.com/hadolint/hadolint)
    cmds:
      - task: do:lint
        vars: { DOCKERFILE_PATH: frankenphp/Dockerfile }

  generate:
    desc: Generate all Dockerfiles from Dockerfile.tmpl
    cmds:
      - task: generate:variant
        vars: { VARIANT: fpm }
      - task: generate:variant
        vars: { VARIANT: apache }
      - task: generate:variant
        vars: { VARIANT: frankenphp }

  generate:variant:
    internal: true
    vars:
      BASE_IMAGE:
        sh: awk '/^FROM / && !found { print $2; found=1 }' {{.VARIANT}}/Dockerfile
    cmds:
      - docker run
        --rm
        --volume $(pwd)/Dockerfile.tmpl:/input/Dockerfile.tmpl:ro
        --volume $(pwd)/variants/{{.VARIANT}}.yaml:/input/variant.yaml:ro
        --env "BASE_IMAGE={{.BASE_IMAGE}}"
        hairyhenderson/gomplate:{{.GOMPLATE_TAG_VERSION}}
        --context .=file:///input/variant.yaml
        --file /input/Dockerfile.tmpl
        > {{.VARIANT}}/Dockerfile
    requires:
      vars: [VARIANT]

  install:hooks:
    desc: Install git hooks (pre-commit regenerates and stages Dockerfiles from template)
    cmds:
      - cp scripts/pre-commit .git/hooks/pre-commit

  remove:hooks:
    desc: Remove installed git hooks
    cmds:
      - rm -f .git/hooks/pre-commit

  do:lint:
    internal: true
    cmds:
      - docker run
        --interactive
        --rm
        --volume $(pwd)/.hadolint.yml:/.hadolint.yml
        hadolint/hadolint:{{.HADOLINT_TAG_VERSION}}
        hadolint
        -
        < {{.DOCKERFILE_PATH}}
    requires:
      vars: [DOCKERFILE_PATH]

  shell:fpm:
    desc: Interactive shell
    interactive: true
    vars:
      DOCKER_IMAGE_NAME: php84
    cmds:
      - docker run
        --interactive
        --tty
        --rm
        {{.DOCKER_REPO}}/{{.DOCKER_OWNER}}/{{.DOCKER_IMAGE_NAME}}:builder_nodejs-{{.VERSION | default "latest" }}
        bash

  shell:apache:
    desc: Interactive shell
    interactive: true
    vars:
      DOCKER_IMAGE_NAME: php84/apache
    cmds:
      - docker run
        --interactive
        --tty
        --rm
        {{.DOCKER_REPO}}/{{.DOCKER_OWNER}}/{{.DOCKER_IMAGE_NAME}}:builder_nodejs-{{.VERSION | default "latest" }}
        bash

  shell:frankenphp:
    desc: Interactive shell
    interactive: true
    vars:
      DOCKER_IMAGE_NAME: php84/frankenphp
    cmds:
      - docker run
        --interactive
        --tty
        --rm
        {{.DOCKER_REPO}}/{{.DOCKER_OWNER}}/{{.DOCKER_IMAGE_NAME}}:builder_nodejs-{{.VERSION | default "latest" }}
        bash
